<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今天中午吃什么</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23ff8a3d'/%3E%3Ccircle cx='46' cy='18' r='8' fill='%23ffd166'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Arial' font-size='22' font-weight='700' fill='%231e1b4b'%3EEW%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <main class="page">
      <section class="card hero">
        <div>
          <p class="eyebrow">午饭选择器</p>
          <h1><span>今天中午</span><strong>吃什么？</strong></h1>
          <p class="subtitle">把选择困难交给一点随机和一点仪式感，主选、备选、历史记录都帮你安排好。</p>
        </div>
        <div class="hero-orb" aria-hidden="true">
          <span>Lunch</span>
        </div>
      </section>

      <section class="layout">
        <section class="card panel">
          <div class="panel-header">
            <h2>吃什么候选</h2>
            <button id="clear-button" class="ghost-button" type="button">清空全部</button>
          </div>

          <form id="option-form" class="option-form">
            <label class="sr-only" for="option-input">添加吃饭选项</label>
            <input id="option-input" name="option" type="text" maxlength="30" placeholder="例如：麻辣烫、黄焖鸡、沙拉" autocomplete="off" />
            <button class="primary-button" type="submit">添加</button>
          </form>

          <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
          <ul id="option-list" class="option-list"></ul>
        </section>

        <section class="card panel result-panel">
          <div class="panel-header">
            <h2>随机结果</h2>
            <button id="pick-button" class="primary-button" type="button">帮我决定</button>
          </div>

          <div class="result-grid">
            <article class="result-card primary-result">
              <p class="result-label">主选</p>
              <p id="primary-result" class="result-value empty">还没抽</p>
            </article>
            <article class="result-card secondary-result">
              <p class="result-label">备选</p>
              <p id="secondary-result" class="result-value empty">还没抽</p>
            </article>
          </div>

          <section class="history-panel">
            <div class="history-block">
              <h3>最近吃过</h3>
              <label class="exclude-control" for="exclude-count-input">
                排除最近
                <input id="exclude-count-input" type="number" min="0" max="10" step="1" />
                次主选
              </label>
              <ul id="recent-list" class="history-list"></ul>
            </div>
            <div class="history-block">
              <div class="history-title-row">
                <h3>历史记录</h3>
                <button id="clear-history-button" class="ghost-button compact-button" type="button">清空历史</button>
              </div>
              <p class="history-tip">按最近到更早的顺序展示，包含主选、备选和时间。</p>
              <ul id="history-list" class="history-list history-records"></ul>
            </div>
          </section>

          <p class="result-tip">规则：优先排除最近 N 次吃过和上一次主选，备选不会和主选重复。</p>
        </section>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/particles.js"></script>
  </body>
</html>
